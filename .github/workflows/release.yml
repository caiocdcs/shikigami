name: Release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux
            runner: ubuntu-latest
            artifact: shikigami-x86_64-linux
          - name: aarch64-linux
            runner: ubuntu-24.04-arm
            artifact: shikigami-aarch64-linux

    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --release

      - name: Package binary + checksum
        run: |
          strip target/release/shikigami
          tar czf ${{ matrix.artifact }}.tar.gz -C target/release shikigami
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: shikigami-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@c95fe1489396bdad09f212c5d1f36c53c3c47f15 # v2.2.1
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
          generate_release_notes: true
