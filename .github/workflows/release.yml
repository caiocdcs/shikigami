name: Release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux
            runner: ubuntu-latest
            artifact: shikigami-x86_64-linux
          - name: aarch64-linux
            runner: ubuntu-24.04-arm
            artifact: shikigami-aarch64-linux
          - name: x86_64-darwin
            runner: macos-13
            artifact: shikigami-x86_64-darwin
          - name: aarch64-darwin
            runner: macos-latest
            artifact: shikigami-aarch64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - run: nix build

      - name: Package binary + checksum
        run: |
          cp result/bin/shikigami shikigami
          tar czf ${{ matrix.artifact }}.tar.gz shikigami
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          rm shikigami

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: shikigami-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@c95fe1489396bdad09f212c5d1f36c53c3c47f15 # v2.2.1
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
          generate_release_notes: true
